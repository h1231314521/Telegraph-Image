<script>
export default {
  data() {
    return {
      status: 'idle', // idle | uploading | done | error
      selectedFormat: 'raw',
      formats: [
        { label: 'HTML', value: 'html' },
        { label: 'Markdown', value: 'markdown' },
        { label: '直接链接', value: 'raw' }
      ],
      uploadedUrl: '',
      file: null
    }
  },
  computed: {
    statusClass() {
      return this.status
    },
    formattedUrl() {
      if (!this.uploadedUrl) return ''
      switch (this.selectedFormat) {
        case 'html':
          return `<img src="${this.uploadedUrl}" alt="image" />`
        case 'markdown':
          return `![image](${this.uploadedUrl})`
        case 'raw':
        default:
          return this.uploadedUrl
      }
    }
  },
  methods: {
    handleFileSelect(e) {
      const file = e.target.files[0]
      if (!file) return
      this.file = file
      this.uploadFile(file)
    },
    async uploadFile(file) {
      this.status = 'uploading'
      const formData = new FormData()
      formData.append('file', file)

      try {
        // 这里使用项目原有的上传 API 路径，通常为 /api/upload
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        })
        if (!response.ok) throw new Error('Upload failed')
        const data = await response.json()
        // 假设返回的数据中包含图片 URL 字段，例如 data.url
        this.uploadedUrl = data.url || data.src || data.link
        if (!this.uploadedUrl) throw new Error('No URL returned')
        this.status = 'done'
      } catch (err) {
        console.error(err)
        this.status = 'error'
      }
    },
    copyUrl() {
      const input = document.getElementById('url-content')
      if (!input) return
      input.select()
      try {
        document.execCommand('copy')
        // 可添加轻提示
        this.$message?.success('已复制到剪贴板') // 如果项目有 Element UI
      } catch (e) {
        // fallback
        navigator.clipboard?.writeText(input.value).then(() => {
          // 提示
        })
      }
    },
    resetUpload() {
      this.status = 'idle'
      this.uploadedUrl = ''
      this.file = null
      // 清空 input 值以便重复选择同一文件
      const input = document.getElementById('upFiles')
      if (input) input.value = ''
    }
  }
}
</script>
